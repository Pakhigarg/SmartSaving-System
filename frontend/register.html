<!DOCTYPE html>

<html>

<head>
<meta charset="UTF-8">
<title>
Smart Saving - Register
</title>

</head>


<body>


<div class="auth-container">


<div class="auth-card">


<h1>
Smart Saving
</h1>


<p>
Create your account
</p>

>

>

Already have account?

</p>


</div>
