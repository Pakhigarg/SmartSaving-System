<div class="main">


<h1>
Expense Management 💸
</h1>



<div class="card">


<h2>
Add New Expense
</h2>


<div class="expense-form">


<input 
id="title"
placeholder="Expense Name"
>


<input
id="amount"
type="number"
placeholder="Amount"
>



<select id="category">


<option>
Food
</option>


<option>
Travel
</option>


<option>
Shopping
</option>


<option>
Bills
</option>


</select>



<input
id="date"
type="date"
>



<button onclick="addExpense()">

+ Add Expense

</button>


</div>


</div>






<div class="card">


<h2>
Expense Analysis
</h2>


<canvas id="expenseChart"></canvas>


</div>







<div class="card">


<h2>
Recent Expenses
</h2>



<table>


<thead>

<tr>

<th>
Name
</th>

<th>
Amount
</th>

<th>
Category
</th>

<th>
Action
</th>


</tr>

</thead>



<tbody id="expenseList">


</tbody>



</table>



</div>




</div>





<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="js/api.js"></script>

</body>
